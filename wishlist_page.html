<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ma Wishlist 🎁</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #fdf6f0;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    h1 {
      font-size: 2.5em;
      color: #ff6f61;
    }
    p {
      font-size: 1.1em;
      color: #555;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.2s;
    }
    .card:hover {
      transform: scale(1.02);
    }
    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }
    .card-content {
      padding: 15px;
    }
    .card h3 {
      margin: 0 0 10px;
      color: #ff6f61;
    }
    .card a {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      background: #ff6f61;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      transition: background 0.2s;
    }
    .card a:hover {
      background: #e65b50;
    }
  </style>
</head>
<body>
  <header>
    <h1>Ma Wishlist 🎁</h1>
    <p>Voici quelques idées de cadeaux qui me feraient plaisir ✨</p>
  </header>

  <div class="grid">
    <div class="card">
      <img src="https://via.placeholder.com/300x180" alt="Cadeau 1">
      <div class="card-content">
        <h3>Cadeau 1</h3>
        <p>Une petite description sympa du cadeau.</p>
        <a href="#">Voir le produit</a>
      </div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x180" alt="Cadeau 2">
      <div class="card-content">
        <h3>Cadeau 2</h3>
        <p>Un autre objet que j’aimerais recevoir.</p>
        <a href="#">Voir le produit</a>
      </div>
    </div>
  </div>
</body>
</html>
